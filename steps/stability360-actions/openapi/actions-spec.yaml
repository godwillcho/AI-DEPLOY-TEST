openapi: "3.0.3"
info:
  title: "Stability360 Actions API"
  version: "4.0.0"

servers:
  - url: "${API_GATEWAY_URL}"

paths:
  /intake/helper:
    post:
      operationId: intakeHelper
      summary: "Validate ZIP, get required fields, or check partner affiliation"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - action
              properties:
                action:
                  type: string
                  enum:
                    - classifyNeed
                    - validateZip
                    - getRequiredFields
                    - checkPartner
                    - getNextSteps
                    - recordDisposition
                need:
                  type: string
                zipCode:
                  type: string
                category:
                  type: string
                employer:
                  type: string
                hasResults:
                  type: boolean
                disposition:
                  type: string
                  description: "Call outcome: live_transfer, callback, additional_search, self_service, out_of_area, declined, emergency"
                instance_id:
                  type: string
                contact_id:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                keyword:
                  type: string
                  description: "Need category (e.g. food, utilities, shelter)"
                contactMethod:
                  type: string
                contactInfo:
                  type: string
                employmentStatus:
                  type: string
                preferredDays:
                  type: string
                  description: "Preferred days for callback"
                preferredTimes:
                  type: string
                  description: "Preferred times for callback"
      responses:
        "200":
          description: "OK"
      security:
        - apiKeyAuth: []

  /resources/search:
    post:
      operationId: resourceLookup
      summary: "Search community resources by keyword and location. Include ALL collected client data as extra fields."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - keyword
              properties:
                keyword:
                  type: string
                  description: "Specific search term (e.g. 'food pantry', 'electric bill')"
                zipCode:
                  type: string
                instance_id:
                  type: string
                contact_id:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                contactMethod:
                  type: string
                  description: "phone or email"
                contactInfo:
                  type: string
                  description: "Phone number or email address"
                employmentStatus:
                  type: string
                employer:
                  type: string
                age:
                  type: string
                  description: "Only collect for utilities, rental, or financial categories"
                childrenUnder18:
                  type: string
                  description: "Only collect for utilities, rental, or financial categories"
                monthlyIncome:
                  type: string
                  description: "Only collect for utilities, rental, or financial categories"
                housingSituation:
                  type: string
                  description: "Only collect for utilities, rental, or financial categories"
              additionalProperties: true
      responses:
        "200":
          description: "OK"
      security:
        - apiKeyAuth: []

security:
  - apiKeyAuth: []

components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
